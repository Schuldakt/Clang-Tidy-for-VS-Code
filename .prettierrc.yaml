$schema: https://json.schemastore.org/prettierrc

# Match the existing TypeScript style in src/
singleQuote: true
semi: true
tabWidth: 2
useTabs: false
trailingComma: all
printWidth: 100
bracketSpacing: true
arrowParens: always
endOfLine: lf

overrides:
  - files:
      - "*.yaml"
      - "*.yml"
    options:
      singleQuote: false
  - files: "*.json"
    options:
      trailingComma: none
